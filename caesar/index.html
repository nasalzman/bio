<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Caesar Cipher</title>
    <script defer>
        let map = {
            "A": ["扖", "丝", "匄"],
            "B": ["地", "乓", "似"],
            "C": ["劯", "丣", "坅"],
            "D": ["侙", "乵", "侖"],
            "E": ["剌", "侳", "㧦"],
            "F": ["俺", "勏", "唋"],
            "G": ["偫", "𠁄", "痖"],
            "H": ["㑶", "厦", "𤗖"],
            "I": ["催", "琿", "裟"],
            "J": ["儁", "䴭", "踁"],
            "K": ["𠁸", "慫", "䅬"],
            "L": ["儅", "磏", "𨉟"],
            "M": ["㒞", "騀", "龋"],
            "N": ["𡂹", "簟", "䞇"],
            "O": ["嚫", "巆", "蘂"],
            "P": ["𡄫", "䎙", "𠑕"],
            "Q": ["儺", "䦴", "䶳"],
            "R": ["囋", "𢑊", "艫"],
            "S": ["囐", "㪻", "欐"],
            "T": ["儾", "欔", "䌯"],
            "U": ["囔", "㝈", "㩹"],
            "V": ["灦", "㒪", "㔶"],
            "W": ["𡆞", "𣬚", "䴏"],
            "X": ["㠨", "欟", "𨈇"],
            "Y": ["𣡹", "纞", "䶪"],
            "Z": ["䉹", "厵", "𪛇"]
        }

        function cipher() {
            let input = document.getElementById("message").value.toUpperCase();
            let output = document.getElementById("encrypted");

            for (let i = 0; i < input.length; i++) {
                if (!map.hasOwnProperty(input[i])) continue;
                output.innerText += map[input[i]][Math.floor(Math.random() * 3)];
            }
        }
    </script>
</head>
<body>
    <h1>Caesar Cipher</h1>
    <label for="message">Enter a message: </label><input id="message" type="text"><br>
    <button onclick="cipher()">Encrypt</button>
    <p id="encrypted"></p>
</body>
</html>
