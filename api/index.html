<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Magic Api</title>
    <script defer>
        let num = 0
        async function card() {
            let card = document.getElementById("card")
            let data = await fetch("https://api.magicthegathering.io/v1/cards?colors=" + document.getElementById("color").value);
            data = await data.json();
            card.innerText = data["cards"][num++]["name"] + ": " + data["cards"][num++]["text"];
            console.log(data);
        }
    </script>
</head>
<body>
    <label for="color">Color: </label><select id="color" onchange="card()">
        <option value="green" selected>Green</option>
        <option value="red">Red</option>
        <option value="blue">Blue</option>
        <option value="white">White</option>
        <option value="black">Black</option>
    </select>
    <button onclick="card()">New Card</button><br><br>
    <p id="card"></p>
</body>
</html>
